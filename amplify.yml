version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # MEMBERSTACK_TOKEN must be set as an Amplify environment variable.
        # It is only read server-side (in app/api/.../route.ts) and is never
        # bundled into client code.
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
